services:
  # ──────────────────────────────────────────────
  # Banco de Dados — Desenvolvimento (porta 5432)
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: produtos_db_dev
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Banco de Dados — Testes (porta 5433)
  # Sem volume persistente (dados descartáveis)
  # ──────────────────────────────────────────────
  db_test:
    image: postgres:15-alpine
    container_name: produtos_db_test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Aplicação FastAPI
  # ──────────────────────────────────────────────
  web:
    build: .
    container_name: produtos_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/produtos_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_dev_data:
